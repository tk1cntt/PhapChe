<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GitNexus Legal - Login</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#0f766e;
  --primary-light:#14b8a6;
  --text:#0f172a;
  --muted:#64748b;
  --border:#e2e8f0;
  --bg:#f8fafc;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Inter',sans-serif;
  min-height:100vh;

  background:
    radial-gradient(circle at top right,
      rgba(20,184,166,.12),
      transparent 35%
    ),
    linear-gradient(
      180deg,
      #ffffff,
      #f8fafc
    );

  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
}

.login-card{
  width:100%;
  max-width:460px;

  background:#fff;

  border:1px solid var(--border);

  border-radius:28px;

  padding:40px;

  box-shadow:
    0 20px 60px rgba(15,23,42,.08);
}

.logo-wrapper{
  display:flex;
  justify-content:center;
  margin-bottom:20px;
}

.logo{
  width:68px;
  height:68px;

  border-radius:20px;

  background:
    linear-gradient(
      135deg,
      var(--primary-light),
      var(--primary)
    );

  color:#fff;

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:30px;
  font-weight:800;

  box-shadow:
    0 12px 32px rgba(15,118,110,.25);
}

.title{
  text-align:center;
  font-size:42px;
  font-weight:800;
  letter-spacing:-1px;
  color:var(--text);
}

.subtitle{
  text-align:center;
  margin-top:12px;
  color:var(--muted);
  line-height:1.6;
  margin-bottom:32px;
}

.form-group{
  margin-bottom:20px;
}

.form-group label{
  display:block;
  margin-bottom:8px;

  font-size:14px;
  font-weight:600;

  color:#334155;
}

.form-group input{
  width:100%;
  height:52px;

  border:1px solid #cbd5e1;
  border-radius:14px;

  padding:0 16px;

  font-size:15px;

  transition:.2s;
}

.form-group input:focus{
  outline:none;

  border-color:var(--primary-light);

  box-shadow:
    0 0 0 4px rgba(20,184,166,.12);
}

.options{
  display:flex;
  justify-content:space-between;
  align-items:center;

  margin-bottom:24px;
}

.remember{
  display:flex;
  align-items:center;
  gap:8px;

  font-size:14px;
  color:#475569;
}

.forgot-password{
  text-decoration:none;
  color:var(--primary);
  font-weight:600;
  font-size:14px;
}

.login-btn{
  width:100%;
  height:54px;

  border:none;
  border-radius:14px;

  cursor:pointer;

  color:white;
  font-size:15px;
  font-weight:700;

  background:
    linear-gradient(
      135deg,
      var(--primary-light),
      var(--primary)
    );

  transition:.2s;
}

.login-btn:hover{
  transform:translateY(-2px);

  box-shadow:
    0 12px 30px rgba(15,118,110,.3);
}

.divider{
  margin:28px 0;

  display:flex;
  align-items:center;
  gap:16px;

  color:#94a3b8;
  font-size:14px;
}

.divider::before,
.divider::after{
  content:"";
  flex:1;
  height:1px;
  background:var(--border);
}

.social-btn{
  width:100%;
  height:52px;

  border:1px solid var(--border);
  border-radius:14px;

  background:white;

  font-weight:600;
  cursor:pointer;

  transition:.2s;
}

.social-btn:hover{
  background:#f8fafc;
}

.support{
  margin-top:28px;
  text-align:center;

  color:var(--muted);
  font-size:14px;
}

.support a{
  color:var(--primary);
  text-decoration:none;
  font-weight:600;
}

.version{
  margin-top:24px;
  text-align:center;

  font-size:12px;
  color:#94a3b8;
}

@media(max-width:480px){

  .login-card{
    padding:28px;
  }

  .title{
    font-size:34px;
  }

  .options{
    flex-direction:column;
    align-items:flex-start;
    gap:12px;
  }
}
</style>
</head>

<body>

<div class="login-card">

  <div class="logo-wrapper">
    <div class="logo">G</div>
  </div>

  <h1 class="title">
    GitNexus Legal
  </h1>

  <p class="subtitle">
    Đăng nhập để truy cập workspace và quản lý hồ sơ pháp lý của bạn
  </p>

  <form>

    <div class="form-group">
      <label>Email</label>
      <input
        type="email"
        placeholder="admin@example.com"
      >
    </div>

    <div class="form-group">
      <label>Mật khẩu</label>
      <input
        type="password"
        placeholder="••••••••••"
      >
    </div>

    <div class="options">

      <label class="remember">
        <input type="checkbox">
        <span>Ghi nhớ đăng nhập</span>
      </label>

      <a href="#" class="forgot-password">
        Quên mật khẩu?
      </a>

    </div>

    <button type="submit" class="login-btn">
      Đăng nhập
    </button>

  </form>

  <div class="divider">
    hoặc
  </div>

  <button class="social-btn">
    Đăng nhập bằng Google
  </button>

  <div class="support">
    Cần hỗ trợ?
    <a href="#">
      Liên hệ quản trị viên
    </a>
  </div>

  <div class="version">
    GitNexus Legal • Version 1.0.0
  </div>

</div>

</body>
</html>
